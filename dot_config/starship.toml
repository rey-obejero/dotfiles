add_newline = false
# Keeps the directory and git branch right next to each other
format = "$directory$git_branch "

[directory]
truncate_to_repo = false
truncation_length = 0
fish_style_pwd_dir_length = 0
style = "cyan bold"
format = "[$path]($style)"

[git_branch]
style = "cyan bold"
# Added a literal space inside the quotes right before the styled text block
format = " [$branch]($style)"

[character]
disabled = true
